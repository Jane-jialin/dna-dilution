<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNA稀释">
<meta name="theme-color" content="#0a0e14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>DNA 稀释计算器</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --surface-2: #182030;
    --border: #1e2d3d;
    --accent: #3ecf8e;
    --accent-glow: rgba(62, 207, 142, 0.15);
    --accent-dim: rgba(62, 207, 142, 0.6);
    --text: #e8edf3;
    --text-muted: #5a6a7a;
    --text-label: #8a99aa;
    --danger: #ef6461;
    --dna-purple: #b388ff;
    --water-blue: #4dd0e1;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { font-size: 16px; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(1.5rem + var(--sat)) 1.25rem calc(1.5rem + var(--sab));
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(62, 207, 142, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 80%, rgba(79, 195, 247, 0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s ease forwards;
  }

  .header-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 0.9rem;
    background: linear-gradient(135deg, var(--accent), #4fc3f7);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 8px 32px rgba(62, 207, 142, 0.2);
  }

  .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
  .header p { font-size: 0.82rem; color: var(--text-muted); font-weight: 300; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.24s; }

  .card-title {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .card-title::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .input-group { margin-bottom: 1rem; }
  .input-group:last-child { margin-bottom: 0; }

  .input-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-label);
    margin-bottom: 0.45rem;
  }

  .input-wrapper { position: relative; display: flex; align-items: center; }

  .input-wrapper input {
    width: 100%;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 0.8rem 3.2rem 0.8rem 0.9rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }

  .input-wrapper input::placeholder {
    color: var(--text-muted);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
  }

  .input-wrapper input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-wrapper .unit {
    position: absolute;
    right: 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Readonly */
  .readonly-wrapper { position: relative; display: flex; align-items: center; }
  .readonly-input {
    width: 100%;
    background: rgba(30, 45, 61, 0.3);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 0.8rem 3.2rem 0.8rem 0.9rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 400;
  }
  .lock-icon { position: absolute; right: 3rem; font-size: 0.65rem; opacity: 0.4; }
  .readonly-wrapper .unit {
    position: absolute;
    right: 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Result */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.24s forwards;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }

  .result-card.has-result {
    border-color: rgba(62, 207, 142, 0.3);
    box-shadow: 0 0 40px rgba(62, 207, 142, 0.06);
  }

  .result-card.error {
    border-color: rgba(239, 100, 97, 0.3);
    box-shadow: 0 0 40px rgba(239, 100, 97, 0.06);
  }

  .result-label {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 0.65rem;
  }

  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1.2;
    transition: opacity 0.3s ease;
  }

  .result-value.error {
    color: var(--danger);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
  }

  .result-unit {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
    font-family: 'DM Mono', monospace;
  }

  .result-summary {
    margin-top: 1.25rem;
    padding-top: 1.1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 1.8rem;
  }

  .summary-item { text-align: center; }
  .summary-item .label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.25rem;
  }
  .summary-item .value { font-family: 'DM Mono', monospace; font-size: 0.9rem; font-weight: 500; }
  .summary-item .value.sample { color: var(--dna-purple); }
  .summary-item .value.water { color: var(--water-blue); }
  .summary-item .value.total { color: var(--accent); }

  .formula {
    margin-top: 1.1rem;
    padding: 0.65rem 0.9rem;
    background: rgba(62, 207, 142, 0.04);
    border-radius: 9px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    line-height: 1.6;
  }
  .formula span.accent { color: var(--accent-dim); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .result-value.pulse { animation: pulse 0.4s ease; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] { -moz-appearance: textfield; }

  .footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeUp 0.5s ease 0.4s forwards;
  }

  @media (max-width: 380px) {
    body { padding: calc(1rem + var(--sat)) 0.9rem calc(1rem + var(--sab)); }
    .card, .result-card { padding: 1.2rem; border-radius: 14px; }
    .result-value { font-size: 1.9rem; }
    .header h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-icon">🧬</div>
    <h1>DNA 稀释计算器</h1>
    <p>输入样品浓度，计算所需加水量</p>
  </div>

  <div class="card">
    <div class="card-title">实验参数</div>
    <div class="input-group">
      <label>样品体积</label>
      <div class="readonly-wrapper">
        <div class="readonly-input">10</div>
        <span class="lock-icon">🔒</span>
        <span class="unit">μL</span>
      </div>
    </div>
    <div class="input-group">
      <label>目标浓度</label>
      <div class="readonly-wrapper">
        <div class="readonly-input">1</div>
        <span class="lock-icon">🔒</span>
        <span class="unit">ng/μL</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">样品浓度</div>
    <div class="input-group">
      <label>当前 DNA 浓度</label>
      <div class="input-wrapper">
        <input type="number" id="concentration" placeholder="请输入浓度值" step="any" min="0" autocomplete="off" inputmode="decimal">
        <span class="unit">ng/μL</span>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">需添加纯水量</div>
    <div class="result-value" id="resultValue">—</div>
    <div class="result-unit" id="resultUnit"></div>
    <div class="result-summary" id="resultSummary" style="display:none;">
      <div class="summary-item">
        <div class="label">样品</div>
        <div class="value sample">10 μL</div>
      </div>
      <div class="summary-item">
        <div class="label">加水</div>
        <div class="value water" id="waterVol">—</div>
      </div>
      <div class="summary-item">
        <div class="label">终体积</div>
        <div class="value total" id="totalVol">—</div>
      </div>
    </div>
    <div class="formula" id="formula">
      C₁ × V₁ = C₂ × V₂ → V<sub>水</sub> = V₂ − V₁
    </div>
  </div>

  <div class="footer">基于 C₁V₁ = C₂V₂ 稀释公式 · DNA Dilution Calculator</div>
</div>

<script>
  const input = document.getElementById('concentration');
  const resultCard = document.getElementById('resultCard');
  const resultValue = document.getElementById('resultValue');
  const resultUnit = document.getElementById('resultUnit');
  const resultSummary = document.getElementById('resultSummary');
  const waterVol = document.getElementById('waterVol');
  const totalVol = document.getElementById('totalVol');
  const formula = document.getElementById('formula');

  const V1 = 10;
  const C2 = 1;

  function calculate() {
    const raw = input.value.trim();
    resultCard.classList.remove('has-result', 'error');

    if (raw === '') {
      resultValue.textContent = '—';
      resultValue.className = 'result-value';
      resultUnit.textContent = '';
      resultSummary.style.display = 'none';
      formula.innerHTML = 'C₁ × V₁ = C₂ × V₂ → V<sub>水</sub> = V₂ − V₁';
      return;
    }

    const C1 = parseFloat(raw);

    if (isNaN(C1) || C1 <= 0) {
      resultCard.classList.add('error');
      resultValue.textContent = '请输入有效的正数浓度';
      resultValue.className = 'result-value error';
      resultUnit.textContent = '';
      resultSummary.style.display = 'none';
      formula.innerHTML = '';
      return;
    }

    if (C1 < C2) {
      resultCard.classList.add('error');
      resultValue.textContent = '浓度低于目标值，无法稀释';
      resultValue.className = 'result-value error';
      resultUnit.textContent = '';
      resultSummary.style.display = 'none';
      formula.innerHTML = '当前浓度需 ≥ 目标浓度，加水只能降低浓度';
      return;
    }

    const V2 = (C1 * V1) / C2;
    const water = V2 - V1;

    resultCard.classList.add('has-result');
    resultValue.className = 'result-value pulse';
    resultValue.textContent = water.toFixed(2);
    resultUnit.textContent = 'μL (微升)';

    resultSummary.style.display = 'flex';
    waterVol.textContent = water.toFixed(2) + ' μL';
    totalVol.textContent = V2.toFixed(2) + ' μL';

    formula.innerHTML =
      '<span class="accent">' + C1 + '</span> × ' + V1 + ' = <span class="accent">' + C2 + '</span> × <span class="accent">' + V2.toFixed(2) + '</span>' +
      ' → V<sub>水</sub> = ' + V2.toFixed(2) + ' − ' + V1 + ' = <span class="accent">' + water.toFixed(2) + ' μL</span>';

    setTimeout(() => resultValue.classList.remove('pulse'), 400);
  }

  input.addEventListener('input', calculate);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
