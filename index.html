<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<title>DNA Dilution Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:#ffffff;color:#111827;
  min-height:100vh;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  padding:12px 16px;
  -webkit-font-smoothing:antialiased;
}
.app{
  width:100%;max-width:480px;margin:0 auto;
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-flex:1;flex:1;
}

.header{text-align:center;padding:4px 0 14px;-webkit-flex-shrink:0;flex-shrink:0}
.header h1{font-size:1.2rem;font-weight:700;letter-spacing:-0.02em}
.header p{font-size:12px;color:#9ca3af;font-weight:300;margin-top:2px}

.main-card{
  -webkit-flex-shrink:0;flex-shrink:0;
  background:#fff;border:1.5px solid #e0e4ea;border-radius:16px;
  padding:16px 16px 14px;margin-bottom:10px;
}

.input-section{margin-bottom:14px}
.input-label{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:6px;margin-bottom:8px}
.dot-green{width:7px;height:7px;border-radius:50%;background:#16a34a;-webkit-flex-shrink:0;flex-shrink:0}
.input-label span{font-size:12px;font-weight:600;color:#6b7280;letter-spacing:0.05em}

.input-wrap{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  gap:4px;
  background:#f5f7fa;border:1.5px solid #e0e4ea;border-radius:11px;
  padding:0 6px 0 12px;
  -webkit-transition:border-color 0.2s,box-shadow 0.2s;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.input-wrap:focus-within{
  border-color:#16a34a;
  -webkit-box-shadow:0 0 0 3px rgba(22,163,74,0.07);
  box-shadow:0 0 0 3px rgba(22,163,74,0.07);
}

.input-wrap input{
  -webkit-flex:1;flex:1;
  border:none;background:transparent;
  padding:12px 0;
  color:#111827;
  font-family:'JetBrains Mono',monospace;
  font-size:20px;font-weight:600;
  outline:none;-webkit-appearance:none;
  min-width:0;
}
.input-wrap input::-webkit-input-placeholder{
  color:#9ca3af;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:300;
}

.clear-btn{
  display:none;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  background:#e5e7eb;border:none;cursor:pointer;
  -webkit-flex-shrink:0;flex-shrink:0;
  -webkit-transition:background 0.15s,transform 0.1s;
  transition:background 0.15s,transform 0.1s;
}
.clear-btn.show{display:-webkit-flex;display:flex}
.clear-btn:active{background:#d1d5db;-webkit-transform:scale(0.9);transform:scale(0.9)}
.clear-btn svg{width:14px;height:14px}

.unit-label{text-align:right;margin-top:5px;font-size:12px;color:#6b7280}

.divider-line{
  border:none;border-top:1px dashed #e0e4ea;
  margin:0 0 14px;
}

.result-section{text-align:center}
.result-label{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  gap:5px;margin-bottom:6px;
}
.result-label span{font-size:12px;font-weight:600;color:#6b7280}
.result-number{
  font-family:'JetBrains Mono',monospace;
  font-size:44px;font-weight:600;color:#16a34a;
  line-height:1.15;
}
.result-number.err{
  color:#dc2626;font-size:16px;
  font-family:'Noto Sans SC',sans-serif;font-weight:500;
}
.result-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:#9ca3af;margin-top:2px}

.summary{
  display:-webkit-flex;display:flex;
  -webkit-justify-content:center;justify-content:center;
  margin-top:12px;padding-top:10px;
  border-top:1px solid #e0e4ea;
}
.summary-item{
  -webkit-flex:1;flex:1;text-align:center;padding:3px 0;
}
.summary-item+.summary-item{border-left:1px solid #e0e4ea}
.summary-item .s-label{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;margin-bottom:1px}
.summary-item .s-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.s-sample{color:#7c3aed}.s-water{color:#0891b2}.s-total{color:#16a34a}

.settings-card{
  -webkit-flex-shrink:0;flex-shrink:0;
  background:#fff;border:1px solid #e0e4ea;border-radius:14px;
  overflow:hidden;
}
.settings-toggle{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  padding:12px 16px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.settings-toggle:active{background:#f5f7fa}
.st-left{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:7px}
.st-left .gear{font-size:14px;opacity:0.5}
.st-left .text{font-size:13px;font-weight:500;color:#6b7280}
.arrow-icon{font-size:11px;color:#9ca3af;-webkit-transition:transform 0.25s;transition:transform 0.25s}
.arrow-icon.open{-webkit-transform:rotate(180deg);transform:rotate(180deg)}

.settings-body{
  max-height:0;overflow:hidden;
  -webkit-transition:max-height 0.35s ease;
  transition:max-height 0.35s ease;
}
.settings-body.open{max-height:300px}
.settings-inner{padding:0 16px 14px}
.setting-row{
  display:-webkit-flex;display:flex;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  padding:10px 0;
}
.setting-row+.setting-row{border-top:1px solid #e0e4ea}
.setting-info{-webkit-flex:1;flex:1;margin-right:12px}
.setting-info .s-title{font-size:13px;font-weight:500;margin-bottom:1px}
.setting-info .s-desc{font-size:11px;color:#9ca3af}
.si-group{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:5px;-webkit-flex-shrink:0;flex-shrink:0}
.si-input{
  width:70px;background:#f5f7fa;
  border:1px solid #e0e4ea;border-radius:8px;
  padding:8px 6px;color:#111827;
  font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:500;text-align:center;
  outline:none;-webkit-appearance:none;
}
.si-input:focus{border-color:#2563eb}
.si-unit{font-family:'JetBrains Mono',monospace;font-size:11px;color:#9ca3af;width:36px}

.formula-box{
  -webkit-flex-shrink:0;flex-shrink:0;
  margin-top:10px;padding:8px 12px;
  background:rgba(37,99,235,0.04);
  border:1px solid rgba(37,99,235,0.08);
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:#9ca3af;line-height:1.65;
}
.formula-box .hl{color:#2563eb;font-weight:500}
.formula-box .hl-g{color:rgba(22,163,74,0.8);font-weight:500}

.footer{-webkit-flex-shrink:0;flex-shrink:0;text-align:center;padding:10px 0 0;font-size:9px;color:#9ca3af}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
@media(max-width:360px){.result-number{font-size:36px}.input-wrap input{font-size:18px}}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>DNA Dilution Calculator</h1>
    <p>DNA dilution water volume calculator</p>
  </div>

  <div class="main-card">

    <div class="input-section">
      <div class="input-label">
        <div class="dot-green"></div>
        <span id="lblConc">DNA Concentration (enter value)</span>
      </div>
      <div class="input-wrap">
        <input type="number" id="c1" placeholder="Enter concentration" step="any" min="0" inputmode="decimal" autocomplete="off">
        <button class="clear-btn" id="clearBtn" type="button">
          <svg viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/><line x1="11" y1="3" x2="3" y2="11" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="unit-label">ng/uL</div>
    </div>

    <div class="divider-line"></div>

    <div class="result-section">
      <div class="result-label">
        <div class="dot-green"></div>
        <span>Water volume to add</span>
      </div>
      <div class="result-number" id="rNum">-</div>
      <div class="result-sub" id="rSub"></div>
      <div class="summary" id="summary" style="display:none">
        <div class="summary-item"><div class="s-label">Sample</div><div class="s-val s-sample" id="sSample"></div></div>
        <div class="summary-item"><div class="s-label">Water</div><div class="s-val s-water" id="sWater"></div></div>
        <div class="summary-item"><div class="s-label">Total</div><div class="s-val s-total" id="sTotal"></div></div>
      </div>
    </div>

  </div>

  <div class="settings-card">
    <div class="settings-toggle" id="toggleBtn">
      <div class="st-left"><span class="gear">&#9881;</span><span class="text" id="lblSettings">Settings</span></div>
      <span class="arrow-icon" id="arrow">&#9662;</span>
    </div>
    <div class="settings-body" id="settingsBody">
      <div class="settings-inner">
        <div class="setting-row">
          <div class="setting-info"><div class="s-title" id="lblVol">Sample volume</div><div class="s-desc" id="lblVolD">Default 10 uL</div></div>
          <div class="si-group">
            <input class="si-input" type="number" id="v1" value="10" step="any" min="0" inputmode="decimal">
            <span class="si-unit">uL</span>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-info"><div class="s-title" id="lblTgt">Target concentration</div><div class="s-desc" id="lblTgtD">Default 1 ng/uL</div></div>
          <div class="si-group">
            <input class="si-input" type="number" id="c2" value="1" step="any" min="0" inputmode="decimal">
            <span class="si-unit">ng/uL</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="formula-box" id="formula">Formula: C1 x V1 = C2 x V2 -> Vw = V2 - V1</div>
  <div class="footer">C1V1 = C2V2</div>

</div>

<script>
(function(){
  var c1El=document.getElementById('c1');
  var v1El=document.getElementById('v1');
  var c2El=document.getElementById('c2');
  var rNum=document.getElementById('rNum');
  var rSub=document.getElementById('rSub');
  var summary=document.getElementById('summary');
  var sSample=document.getElementById('sSample');
  var sWater=document.getElementById('sWater');
  var sTotal=document.getElementById('sTotal');
  var formula=document.getElementById('formula');
  var clearBtn=document.getElementById('clearBtn');

  // Detect language
  var lang='en';
  if(navigator.language&&navigator.language.indexOf('zh')>=0){lang='zh';}

  if(lang==='zh'){
    document.getElementById('lblConc').textContent='\u5F53\u524D DNA \u6D53\u5EA6\uFF08\u9700\u8981\u586B\u5199\uFF09';
    document.getElementById('lblSettings').textContent='\u53C2\u6570\u8BBE\u7F6E';
    document.getElementById('lblVol').textContent='\u6837\u54C1\u4F53\u79EF';
    document.getElementById('lblVolD').textContent='\u9ED8\u8BA4 10 \u03BCL';
    document.getElementById('lblTgt').textContent='\u76EE\u6807\u6D53\u5EA6';
    document.getElementById('lblTgtD').textContent='\u9ED8\u8BA4 1 ng/\u03BCL';
    document.title='DNA \u7A00\u91CA\u8BA1\u7B97\u5668';
    c1El.placeholder='\u8F93\u5165\u6D53\u5EA6';
  }

  function updateClear(){
    if(c1El.value.length>0){clearBtn.className='clear-btn show';}
    else{clearBtn.className='clear-btn';}
  }

  clearBtn.addEventListener('click',function(ev){
    ev.preventDefault();
    c1El.value='';
    c1El.focus();
    updateClear();
    calc();
  });

  document.getElementById('toggleBtn').addEventListener('click',function(){
    var body=document.getElementById('settingsBody');
    var arrow=document.getElementById('arrow');
    if(body.className.indexOf('open')>=0){
      body.className='settings-body';
      arrow.className='arrow-icon';
    }else{
      body.className='settings-body open';
      arrow.className='arrow-icon open';
    }
  });

  function calc(){
    updateClear();
    var c1=parseFloat(c1El.value);
    var v1=parseFloat(v1El.value);
    var c2=parseFloat(c2El.value);

    if(!c1El.value||c1El.value.trim()===''){reset();return;}

    if(isNaN(c1)||c1<=0||isNaN(v1)||v1<=0||isNaN(c2)||c2<=0){
      var msg=lang==='zh'?'\u8BF7\u8F93\u5165\u6709\u6548\u6B63\u6570':'Enter valid positive numbers';
      rNum.className='result-number err';
      rNum.textContent=msg;
      rSub.textContent='';
      summary.style.display='none';
      formula.innerHTML='';
      return;
    }

    if(c1<c2){
      var msg2=lang==='zh'?'\u6D53\u5EA6\u4F4E\u4E8E\u76EE\u6807\u503C':'Concentration below target';
      rNum.className='result-number err';
      rNum.textContent=msg2;
      rSub.textContent=lang==='zh'?'\u65E0\u6CD5\u901A\u8FC7\u52A0\u6C34\u7A00\u91CA':'Cannot dilute by adding water';
      summary.style.display='none';
      formula.innerHTML=lang==='zh'?'\u52A0\u6C34\u53EA\u80FD\u964D\u4F4E\u6D53\u5EA6\uFF0C\u5F53\u524D\u6D53\u5EA6 \u2265 \u76EE\u6807\u6D53\u5EA6':'Adding water only lowers concentration';
      return;
    }

    var v2=(c1*v1)/c2;
    var water=v2-v1;

    rNum.className='result-number';
    rNum.textContent=water.toFixed(2);
    rSub.textContent='uL';

    summary.style.display='-webkit-flex';
    summary.style.display='flex';
    sSample.textContent=v1.toFixed(2)+' uL';
    sWater.textContent=water.toFixed(2)+' uL';
    sTotal.textContent=v2.toFixed(2)+' uL';

    formula.innerHTML='<span class="hl">'+c1+'</span> \u00D7 '+v1.toFixed(2)+' = <span class="hl">'+c2+'</span> \u00D7 <span class="hl">'+v2.toFixed(2)+'</span> \u2192 Vw = '+v2.toFixed(2)+' \u2212 '+v1.toFixed(2)+' = <span class="hl-g">'+water.toFixed(2)+' uL</span>';
  }

  function reset(){
    rNum.className='result-number';
    rNum.textContent='-';
    rSub.textContent='';
    summary.style.display='none';
    formula.innerHTML=lang==='zh'?'\u516C\u5F0F\uFF1AC\u2081 \u00D7 V\u2081 = C\u2082 \u00D7 V\u2082 \u2192 V\u6C34 = V\u2082 \u2212 V\u2081':'Formula: C1 x V1 = C2 x V2 -> Vw = V2 - V1';
  }

  c1El.addEventListener('input',calc);
  v1El.addEventListener('input',calc);
  c2El.addEventListener('input',calc);

  setTimeout(function(){try{c1El.focus();}catch(e){}},300);
})();
</script>
</body>
</html>
